<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13162b"/>
      <stop offset="100%" stop-color="#1a1e35"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#glow)"/>
  <!-- Grid -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="600" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="600" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="600" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <!-- Gold accent line -->
  <rect x="0" y="0" width="4" height="600" fill="#c9a84c" fill-opacity="0.3"/>
  <!-- Camera icon -->
  <rect x="360" y="255" width="80" height="60" rx="10" fill="none" stroke="#c9a84c" stroke-opacity="0.25" stroke-width="2"/>
  <circle cx="400" cy="285" r="16" fill="none" stroke="#c9a84c" stroke-opacity="0.25" stroke-width="2"/>
  <rect x="372" y="249" width="18" height="8" rx="3" fill="#c9a84c" fill-opacity="0.2"/>
  <!-- Label -->
  <text x="400" y="360" text-anchor="middle" fill="#c9a84c" fill-opacity="0.45" font-family="Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="2">ÜBER-UNS-BILD</text>
  <text x="400" y="382" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-family="Arial,sans-serif" font-size="12">Ersetzen mit ueber-uns.webp — 800×600</text>
</svg>
